      Conducted interdisciplinary research in Systems Biology and Computational Network Science, focusing on higher-order organizational patterns in complex biological networks (PPI, residue structural graphs, and brain functional fMRI networks). Developed graphlet-based deep learning models and novel scale-free random network null models. Awarded CSIR-JRF and CSIR-SRF.
