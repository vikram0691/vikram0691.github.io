experience:
  - role: Principal Investigator / MK Bhan Young Researcher Fellow
    org: International Centre for Genetic Engineering and Biotechnology
    start: 2024-10-01
    summary: |
      Principal Investigator of a Department of Biotechnology (DBT) funded research project integrating bulk and single-cell RNA-seq, PPI, epigenomics, and GWAS data using hypergraphs to analyze higher-order network topology and rewiring in temporal lobe epilepsy (TLE). Prioritizing anti-TLE phytochemicals via target-compound interaction networks and deep learning models.
  - role: Data Curator
    org: Indian Biological Data Centre, Regional Centre for Biotechnology
    start: 2024-03-01
    end: 2024-09-30
    summary: |
      Contributed to database design, secure data workflows, metadata standards, and submission pipelines for the Indian Nucleotide Data Archive (INDA) and INDA-CA for secure sharing of sensitive human genomic data. Handled large-scale whole genome sequencing (WGS) and metagenomic surveillance processing pipelines for national projects like INSACOG and GenomeIndia.
  - role: Junior Research Fellow
    org: Sher-e-Kashmir University of Agricultural Sciences and Technology
    start: 2013-12-01
    end: 2015-03-31
    summary: |
      Processed whole-genome resequencing data, performed alignment, variant calling, and downstream quality annotation to discover and prioritize informative SNP markers for a high-density SNP genotyping chip design for Brassica juncea.

