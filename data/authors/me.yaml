bio: |
  Vikram Singh is an MK Bhan Young Research Fellow at the International 
  Centre for Genetic Engineering and Biotechnology (ICGEB), New Delhi. 
  His core research lies at the intersection of Systems Biology and 
  Computational Network Science. He focuses on identifying higher-order
  organizational patterns—like multi-node motifs and dynamic modules—that
  shape biological functions. His current work integrates multi-omics 
  datasets using hypergraph theory and tensor decomposition to map 
  disease-specific rewiring in temporal lobe epilepsy (TLE).

